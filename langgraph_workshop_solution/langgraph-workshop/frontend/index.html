<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧餐廳推薦 - AI 助理</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Serif+TC:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2a2a2a;
            --accent-color: #d4af37;
            --text-main: #f5f5f5;
            --text-dim: #b0b0b0;
            --error-color: #ff4d4d;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Serif TC', serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin-top: 40px;
        }

        h1 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 40px;
            color: var(--accent-color);
            letter-spacing: 2px;
        }

        .search-box {
            background: var(--glass);
            padding: 20px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 20px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        button {
            background: var(--accent-color);
            color: #1a1a1a;
            border: none;
            padding: 0 30px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        #error {
            color: var(--error-color);
            text-align: center;
            margin-bottom: 20px;
            display: none;
            background: rgba(255, 77, 77, 0.1);
            padding: 10px;
            border-radius: 8px;
        }

        .loading {
            text-align: center;
            display: none;
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        .decision-chips {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .chip {
            background: var(--card-bg);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
        }

        .response-text {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            white-space: pre-line;
            border-left: 4px solid var(--accent-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none;
        }

        .restaurant-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--accent-color);
        }

        .card-meta {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card-specialty {
            font-size: 0.9rem;
            background: rgba(212, 175, 55, 0.1);
            padding: 6px 12px;
            border-radius: 6px;
            display: inline-block;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .search-box { flex-direction: column; }
            button { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>智慧餐廳推薦</h1>

        <div class="search-box">
            <input type="text" id="userInput" placeholder="例如：我想吃日式料理，預算 200 元" onkeypress="if(event.key==='Enter') getRecommendation()">
            <button id="submitBtn" onclick="getRecommendation()">搜尋推薦</button>
        </div>

        <div id="error"></div>
        <div id="loading" class="loading">🤔 智囊團思考中...</div>
        <div id="progressLog" style="text-align:center; color:var(--text-dim); margin-bottom:20px; font-size:0.9rem;"></div>

        <div id="decisionArea" class="decision-chips"></div>
        <div id="responseText" class="response-text"></div>
        <div id="restaurantGrid" class="restaurant-grid"></div>
    </div>

    <script>
        const cuisineMap = {
            'japanese':  '🍣 日式料理',
            'italian':   '🍝 義式料理',
            'taiwanese': '🍚 台式料理',
            'korean':    '🌶️ 韓式料理',
            'thai':      '🇹🇭 泰式料理'
        };

        const nodeLabelMap = {
            'parse_input': '🔍 正在解析您的需求...',
            'recommend_node': '🏪 正在為您搜尋合適的餐廳...',
            'format_response_node': '✍️ 正在整理推薦文案...',
            'set_budget_low': '⚙️ 正在切換為平價搜尋策略...',
            'set_budget_high': '⚙️ 正在切換為精緻搜尋策略...'
        };

        const budgetLevelMap = {
            'budget':  '平價路線',
            'premium': '高級路線'
        };

        async function getRecommendation() {
            const userInput = document.getElementById('userInput').value.trim();
            const errorDiv = document.getElementById('error');
            const loadingDiv = document.getElementById('loading');
            const progressLog = document.getElementById('progressLog');
            const btn = document.getElementById('submitBtn');
            const decisionArea = document.getElementById('decisionArea');
            const responseText = document.getElementById('responseText');
            const grid = document.getElementById('restaurantGrid');

            if (!userInput) {
                errorDiv.innerText = '請先輸入你的餐廳需求';
                errorDiv.style.display = 'block';
                return;
            }

            // Reset UI
            errorDiv.style.display = 'none';
            loadingDiv.style.display = 'block';
            progressLog.innerText = '';
            btn.disabled = true;
            decisionArea.innerHTML = '';
            responseText.style.display = 'none';
            grid.innerHTML = '';

            try {
                const response = await fetch('/api/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_input: userInput })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // Keep partial line in buffer

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            
                            if (data.error) {
                                throw new Error(data.error);
                            }

                            if (data.node) {
                                progressLog.innerText = nodeLabelMap[data.node] || `⚙️ 正在執行 ${data.node}...`;
                            }

                            if (data.final) {
                                // Show Decisions
                                const pref = data.preferences;
                                decisionArea.innerHTML = `
                                    <div class="chip">${cuisineMap[pref.cuisine_type] || '🍴 其他'}</div>
                                    <div class="chip">💰 預算 ${pref.budget} 元</div>
                                    <div class="chip">✨ ${budgetLevelMap[data.budget_level] || '一般'}</div>
                                `;

                                // Show Text Response
                                responseText.innerHTML = data.response;
                                responseText.style.display = 'block';

                                // Show Restaurant Cards
                                data.recommendations.forEach(res => {
                                    const card = document.createElement('div');
                                    card.className = 'card';
                                    card.innerHTML = `
                                        <div class="card-content">
                                            <div class="card-title">${res.name}</div>
                                            <div class="card-meta">
                                                <span>📍 ${res.location}</span>
                                                <span>💵 平均 $${res.avg_price} 元</span>
                                                <span>⭐ ${res.rating} / 5.0</span>
                                            </div>
                                            <div class="card-specialty">🎯 ${res.specialty}</div>
                                        </div>
                                    `;
                                    grid.appendChild(card);
                                });
                                progressLog.innerText = '✅ 處理完成！';
                            }
                        }
                    }
                }
            } catch (e) {
                errorDiv.innerText = e.message || '無法連線到伺服器，請確認後端是否已啟動';
                errorDiv.style.display = 'block';
            } finally {
                loadingDiv.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
